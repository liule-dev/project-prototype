version: '3.8'

services:
  # Nginx - 反向代理和静态文件服务
  nginx:
    image: nginx:alpine
    container_name: medical-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./MedicalAssistant_vue/dist:/usr/share/nginx/html:ro
    depends_on:
      - fastapi
    networks:
      - medical-network

  # Redis - Celery Broker & Backend
  redis:
    image: redis:7-alpine
    container_name: medical-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - medical-network

  # FastAPI Application
  fastapi:
    build: 
      context: ./FastAPI1
      dockerfile: Dockerfile
    container_name: fastapi-medical
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - mysql
      - minio
      - qdrant
    environment:
      - REDIS_HOST=redis
      - DB_HOST=mysql
      - MINIO_ENDPOINT=minio:9000
      - QDRANT_HOST=qdrant
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    command: >
      bash -c "
        uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4
      "
    networks:
      - medical-network
    volumes:
      - ./FastAPI1/cache:/app/cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Celery Worker - AI Queue
  celery-ai:
    build: 
      context: ./FastAPI1
      dockerfile: Dockerfile
    container_name: celery-ai-worker
    restart: always
    depends_on:
      - redis
      - mysql
      - minio
      - qdrant
    environment:
      - REDIS_HOST=redis
      - DB_HOST=mysql
      - MINIO_ENDPOINT=minio:9000
      - QDRANT_HOST=qdrant
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    command: >
      bash -c "
        celery -A celery_worker:celery_app worker 
        --loglevel=info 
        --queues=ai_queue 
        --concurrency=4 
        --hostname=ai_worker@%h
      "
    networks:
      - medical-network
    volumes:
      - ./FastAPI1/cache:/app/cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Celery Worker - File Queue
  celery-file:
    build: 
      context: ./FastAPI1
      dockerfile: Dockerfile
    container_name: celery-file-worker
    restart: always
    depends_on:
      - redis
      - mysql
      - minio
      - qdrant
    environment:
      - REDIS_HOST=redis
      - DB_HOST=mysql
      - MINIO_ENDPOINT=minio:9000
      - QDRANT_HOST=qdrant
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    command: >
      bash -c "
        celery -A celery_worker:celery_app worker 
        --loglevel=info 
        --queues=file_queue 
        --concurrency=4 
        --hostname=file_worker@%h
      "
    networks:
      - medical-network
    volumes:
      - ./FastAPI1/cache:/app/cache

  # Celery Worker - Data Queue
  celery-data:
    build: 
      context: ./FastAPI1
      dockerfile: Dockerfile
    container_name: celery-data-worker
    restart: always
    depends_on:
      - redis
      - mysql
      - minio
      - qdrant
    environment:
      - REDIS_HOST=redis
      - DB_HOST=mysql
      - MINIO_ENDPOINT=minio:9000
      - QDRANT_HOST=qdrant
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    command: >
      bash -c "
        celery -A celery_worker:celery_app worker 
        --loglevel=info 
        --queues=data_queue 
        --concurrency=2 
        --hostname=data_worker@%h
      "
    networks:
      - medical-network
    volumes:
      - ./FastAPI1/cache:/app/cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Flower - Celery Monitor
  flower:
    build: 
      context: ./FastAPI1
      dockerfile: Dockerfile
    container_name: celery-flower
    restart: always
    ports:
      - "5555:5555"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
    command: >
      bash -c "
        celery -A celery_worker:celery_app flower 
        --port=5555 
        --basic_auth=admin:admin123
      "
    networks:
      - medical-network

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: mysql-medical
    restart: always
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: medical_assistant
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - medical-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: minio-medical
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - medical-network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-medical
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - medical-network

volumes:
  redis_data:
  mysql_data:
  minio_data:
  qdrant_data:

networks:
  medical-network:
    driver: bridge
